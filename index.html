<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tbag Studio — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBF9F4;
  --surface: #F5F3EE;
  --primary: #96472D;
  --tertiary: #5F5E5E;
  --text: #1B1C19;
  --text-dim: #464742;
  --card-shadow: 0 4px 16px rgba(0,0,0,0.09);
  --card-shadow-hover: 0 12px 36px rgba(0,0,0,0.14);
  --radius: 14px;
  --ease: cubic-bezier(0.22,1,0.36,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Manrope", "PingFang SC", "Hiragino Sans GB", sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── Nav ─── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.4s, backdrop-filter 0.4s;
}
.nav.scrolled {
  background: rgba(251,249,244,0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.nav-brand {
  font-family: "Noto Serif SC", "Noto Serif", Georgia, serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  letter-spacing: 1px;
}

/* ─── Hero ─── */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 48px 60px;
  position: relative;
}
.hero-eyebrow {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.7s var(--ease) 0.2s forwards;
}
.hero-eyebrow::before,
.hero-eyebrow::after {
  content: '';
  display: inline-block;
  width: 28px;
  height: 1.5px;
  background: var(--primary);
}
.hero h1 {
  font-family: "Noto Serif SC", "Noto Serif", Georgia, serif;
  font-size: clamp(44px, 7vw, 96px);
  font-weight: 300;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.7s var(--ease) 0.35s forwards;
}
.hero h1 em {
  font-style: italic;
  color: var(--primary);
}
.hero-tags {
  font-size: 15px;
  color: var(--tertiary);
  letter-spacing: 2px;
  margin-bottom: 40px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.7s var(--ease) 0.5s forwards;
}
.hero-quote {
  font-family: "Noto Serif SC", "Noto Serif", Georgia, serif;
  font-style: italic;
  font-size: clamp(16px, 1.6vw, 22px);
  color: var(--text-dim);
  line-height: 2;
  max-width: 480px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.7s var(--ease) 0.65s forwards;
}
.hero-stat {
  position: absolute;
  bottom: 48px;
  right: 48px;
  text-align: right;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.7s var(--ease) 0.8s forwards;
}
.hero-stat-number {
  font-family: "Noto Serif SC", "Noto Serif", Georgia, serif;
  font-size: clamp(56px, 7vw, 100px);
  font-weight: 400;
  color: var(--primary);
  opacity: 0.16;
  line-height: 1;
}
.hero-stat-label {
  font-size: 12px;
  color: var(--tertiary);
  letter-spacing: 3px;
  margin-top: 4px;
}

/* ─── Filter ─── */
.filter-section {
  position: sticky;
  top: 0;
  z-index: 90;
  background: rgba(251,249,244,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 14px 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border-bottom: 1px solid rgba(70,71,66,0.08);
}
.filter-btn {
  padding: 7px 20px;
  border: 0.5px solid rgba(70,71,66,0.18);
  border-radius: 100px;
  background: transparent;
  color: var(--text-dim);
  font-family: "Manrope", sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.3s var(--ease);
}
.filter-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.filter-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* ─── Gallery Masonry ─── */
.gallery-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px 48px 60px;
}
.gallery {
  columns: 4;
  column-gap: 14px;
}

/* ─── Card ─── */
.card {
  break-inside: avoid;
  margin-bottom: 14px;
  background: #fff;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--card-shadow);
  transition: transform 0.5s var(--ease), box-shadow 0.5s var(--ease);
  opacity: 0;
  transform: translateY(30px);
}
.card.visible {
  opacity: 1;
  transform: translateY(0);
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--card-shadow-hover);
}

.card-media {
  position: relative;
  overflow: hidden;
}
.card-media video {
  width: 100%;
  display: block;
  object-fit: cover;
  transition: transform 0.5s var(--ease);
}
.card:hover .card-media video {
  transform: scale(1.04);
}
.card-media .placeholder {
  width: 100%;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: #C4B397;
}

/* Overlay */
.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.35) 100%);
  opacity: 0;
  transition: opacity 0.4s var(--ease);
  pointer-events: none;
}
.card:hover .card-overlay { opacity: 1; }

/* Category badge */
.card-badge {
  position: absolute;
  top: 12px; left: 12px;
  padding: 4px 12px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  z-index: 2;
}

/* Expand icon */
.card-expand {
  position: absolute;
  bottom: 12px; right: 12px;
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
  z-index: 2;
}
.card:hover .card-expand {
  opacity: 1;
  transform: scale(1);
}
.card-expand svg { width: 16px; height: 16px; }

.card-info {
  padding: 12px 14px 14px;
}
.card-title {
  font-family: "Noto Serif SC", "Noto Serif", Georgia, serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.4;
}

/* ─── Lightbox ─── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10,10,8,0.94);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  animation: fadeIn 0.3s ease;
}
.lightbox.active { display: flex; }
.lightbox-inner {
  position: relative;
  width: 90%;
  max-width: 960px;
}
.lightbox-inner video {
  width: 100%;
  max-height: 82vh;
  border-radius: 8px;
  background: #000;
}
.lightbox-close {
  position: absolute;
  top: -48px; right: 0;
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, color 0.3s;
}
.lightbox-close:hover {
  background: rgba(255,255,255,0.2);
  color: #fff;
}
.lightbox-title {
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  margin-top: 16px;
  font-family: "Noto Serif SC", "Noto Serif", Georgia, serif;
  letter-spacing: 0.5px;
}

/* ─── Footer ─── */
.footer {
  text-align: center;
  padding: 32px 48px;
  border-top: 1px solid rgba(70,71,66,0.08);
  color: var(--tertiary);
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* ─── Animations ─── */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ─── Responsive ─── */
@media (max-width: 1024px) {
  .gallery { columns: 3; }
  .nav, .filter-section, .gallery-wrap { padding-left: 24px; padding-right: 24px; }
  .hero { padding: 90px 24px 36px; }
}
@media (max-width: 768px) {
  .gallery { columns: 2; column-gap: 10px; }
  .card { margin-bottom: 10px; }
  .hero { min-height: 90vh; padding: 80px 20px 60px; }
  .hero-stat { bottom: 24px; right: 24px; }
  .nav { padding: 16px 20px; }
  .filter-section { gap: 6px; padding: 12px 16px; }
  .filter-btn { padding: 6px 14px; font-size: 12px; }
  .gallery-wrap { padding: 20px 12px 48px; }
}
@media (max-width: 480px) {
  .gallery { columns: 2; column-gap: 8px; }
  .card { margin-bottom: 8px; border-radius: 10px; }
  .card-info { padding: 8px 10px 10px; }
  .card-title { font-size: 12px; }
  .card-badge { font-size: 10px; padding: 3px 8px; top: 8px; left: 8px; }
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav" id="nav">
  <a class="nav-brand" href="#">Tbag Studio</a>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-eyebrow">AI Creative Portfolio &middot; 2024-2025</div>
  <h1><em>AI视频</em> 作品集</h1>
  <div class="hero-tags">广告片，故事片，创意动画，艺术视觉</div>
  <div class="hero-quote">
    审美不是天赋，是立场。<br>
    你站在哪里看这个世界，<br>
    决定了你能创造出什么。
  </div>
  <div class="hero-stat">
    <div class="hero-stat-number" id="statCount">3</div>
    <div class="hero-stat-label">件 作 品</div>
  </div>
</section>

<!-- Filter (dynamically generated) -->
<div class="filter-section" id="filterBar">
  <button class="filter-btn active" data-cat="all">全部</button>
</div>

<!-- Gallery -->
<div class="gallery-wrap">
  <div class="gallery" id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lbClose">&#10005;</button>
    <video id="lbVideo" controls playsinline></video>
    <div class="lightbox-title" id="lbTitle"></div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  &copy; 2026 Tbag Studio &middot; Powered by AI
</div>

<script>
var videoData = [];
var currentFilter = 'all';
var activeVideo = null;

async function init() {
  try {
    var basePath = window.location.protocol === 'file:' ? './api/videos.json' : '/api/videos.json';
    var response = await fetch(basePath);
    if (!response.ok) throw new Error('Data not available');
    videoData = await response.json();

    // Build dynamic filters
    var categories = new Set();
    videoData.forEach(function(item) {
      var cats = item.category || [];
      if (typeof cats === 'string') cats = [cats];
      cats.forEach(function(c) { if (c) categories.add(c); });
    });
    renderFilters(Array.from(categories));

    // Detect orientations then render
    detectOrientations();
  } catch (err) {
    console.error('Failed to load data:', err);
    document.getElementById('gallery').innerHTML =
      '<p style="text-align:center;color:var(--tertiary);padding:40px 0;columns:initial">等待数据同步中...</p>';
  }
}

function renderFilters(categories) {
  var bar = document.getElementById('filterBar');
  bar.innerHTML = '<button class="filter-btn active" data-cat="all">全部</button>';
  categories.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-cat', cat);
    btn.textContent = cat;
    bar.appendChild(btn);
  });

  bar.addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    bar.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    renderGallery(e.target.getAttribute('data-cat'));
  });
}

function detectOrientations() {
  var pending = 0;
  videoData.forEach(function(item, idx) {
    if (!item.URL) return;
    pending++;
    var v = document.createElement('video');
    v.preload = 'metadata';
    v.onloadedmetadata = function() {
      item._orientation = v.videoWidth >= v.videoHeight ? 'landscape' : 'portrait';
      pending--;
      if (pending <= 0) renderGallery(currentFilter);
    };
    v.onerror = function() {
      pending--;
      if (pending <= 0) renderGallery(currentFilter);
    };
    v.src = item.URL;
  });
  if (pending === 0) renderGallery(currentFilter);
}

function getCategories(item) {
  var cats = item.category || [];
  if (typeof cats === 'string') return [cats];
  return cats;
}

function renderGallery(filter) {
  currentFilter = filter;
  var el = document.getElementById('gallery');
  var html = '';
  var count = 0;

  videoData.forEach(function(item, idx) {
    var cats = getCategories(item);
    if (filter !== 'all' && cats.indexOf(filter) === -1) return;
    count++;

    var url = item.URL || '';
    var ratio = item._orientation === 'portrait' ? '9/16' : '16/9';
    var badge = cats[0] || '';
    var media;

    if (url) {
      media = '<video src="' + url + '#t=0.001" muted loop preload="metadata" playsinline style="aspect-ratio:' + ratio + '"></video>';
    } else {
      media = '<div class="placeholder" style="aspect-ratio:' + ratio + '">&#9654;</div>';
    }

    html += '<div class="card" data-index="' + idx + '">'
      + '<div class="card-media">'
      + media
      + '<div class="card-overlay"></div>'
      + (badge ? '<span class="card-badge">' + badge + '</span>' : '')
      + '<div class="card-expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div>'
      + '</div>'
      + '<div class="card-info">'
      + '<div class="card-title">' + (item.title || '') + '</div>'
      + '</div>'
      + '</div>';
  });

  if (!html) html = '<p style="text-align:center;color:var(--tertiary);padding:40px 0">暂无作品</p>';
  el.innerHTML = html;

  document.getElementById('statCount').textContent = videoData.length;

  /* Stagger reveal */
  var cards = el.querySelectorAll('.card');
  cards.forEach(function(card, j) {
    setTimeout(function() { card.classList.add('visible'); }, j * 80);
  });

  /* Hover play */
  cards.forEach(function(card) {
    var vid = card.querySelector('video');
    if (!vid) return;
    card.addEventListener('mouseenter', function() { vid.play(); });
    card.addEventListener('mouseleave', function() { vid.pause(); vid.currentTime = 0; });
  });
}

/* Lightbox */
document.getElementById('gallery').addEventListener('click', function(e) {
  var expand = e.target.closest('.card-expand');
  var card = e.target.closest('.card');
  if (!card) return;

  if (!expand) {
    var vid = card.querySelector('video');
    if (vid) vid.paused ? vid.play() : vid.pause();
    return;
  }

  var idx = parseInt(card.getAttribute('data-index'));
  var item = videoData[idx];
  if (!item || !item.URL) return;

  document.getElementById('lbVideo').src = item.URL;
  document.getElementById('lbTitle').textContent = item.title || '';
  document.getElementById('lightbox').classList.add('active');
  document.getElementById('lbVideo').play();
  document.body.style.overflow = 'hidden';
});

function closeLightbox() {
  var lb = document.getElementById('lightbox');
  var vid = document.getElementById('lbVideo');
  vid.pause(); vid.src = '';
  lb.classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

/* Nav scroll */
window.addEventListener('scroll', function() {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
